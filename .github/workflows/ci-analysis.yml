name: CI Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis pipeline (subset for CI speed)
        env:
          NGSPCA_DATA_DIR: 1000G
          NGSPCA_OUTPUT_DIR: output
          NGSPCA_SUBSET: "1000"           # CI-only subset; publish-report.yml uses full cohort
          NGSPCA_PERMUTATIONS: "200"      # Reduced for CI speed; publish-report.yml uses 1000
        run: bash run_all.sh

      - name: Run tests
        env:
          NGSPCA_OUTPUT_DIR: output
        run: pytest tests/ -v

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-output
          path: output/

      - name: Upload interactive report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interactive-report
          path: docs/
